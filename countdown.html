<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for you · 14 may</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Cormorant Garamond',serif;overflow:hidden;min-height:100vh;}
#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* COUNTDOWN */
#countdown-wrap{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:2rem;}
.cd-from{font-style:italic;color:#7a3050;font-size:0.82rem;letter-spacing:0.3em;text-transform:uppercase;text-shadow:0 1px 6px rgba(255,255,255,0.6);}
.cd-title{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(1.4rem,4vw,2.2rem);color:#4a1030;text-align:center;line-height:1.3;text-shadow:0 2px 10px rgba(255,255,255,0.5);}
.cd-units{display:flex;gap:1.2rem;align-items:flex-start;}
.cd-unit{text-align:center;background:rgba(255,255,255,0.5);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.8);border-radius:16px;padding:1rem 1.2rem;min-width:72px;box-shadow:0 4px 20px rgba(200,100,140,0.15);}
.cd-num{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(2rem,6vw,3rem);color:#4a1030;display:block;line-height:1;}
.cd-lbl{font-style:italic;color:#a06080;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;margin-top:0.3rem;display:block;}
.cd-note{font-style:italic;color:rgba(80,20,40,0.45);font-size:0.85rem;letter-spacing:0.08em;text-align:center;}

/* ENVELOPE */
#envelope-wrap{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1.2s ease;}
#envelope-wrap.show{opacity:1;pointer-events:all;}

.envelope{position:relative;width:min(340px,88vw);cursor:pointer;}
.envelope-body{background:linear-gradient(160deg,#fff5f8,#fce8f0);border:1px solid rgba(255,180,210,0.6);border-radius:4px 4px 16px 16px;padding:0;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(200,100,140,0.25);transition:transform 0.3s ease;}
.envelope:hover .envelope-body{transform:translateY(-4px);}

/* flap */
.flap{width:100%;padding-top:55%;position:relative;overflow:hidden;}
.flap-triangle{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(160deg,#f8d8ec,#fce0f0);clip-path:polygon(0 0, 100% 0, 50% 100%);border-bottom:1px solid rgba(255,180,210,0.4);transition:transform 0.8s cubic-bezier(0.34,1.2,0.64,1);transform-origin:top center;}
.envelope.opened .flap-triangle{transform:rotateX(180deg);}
.flap-seal{position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);font-size:1.8rem;z-index:5;transition:opacity 0.4s;pointer-events:none;}
.envelope.opened .flap-seal{opacity:0;}

/* side triangles */
.sides{display:flex;justify-content:space-between;position:relative;}
.side-left{width:0;height:0;border-style:solid;border-width:80px 0 0 min(170px,44vw);border-color:transparent transparent transparent rgba(248,215,232,0.7);}
.side-right{width:0;height:0;border-style:solid;border-width:80px min(170px,44vw) 0 0;border-color:transparent rgba(248,215,232,0.7) transparent transparent;}

/* letter inside */
.letter-peek{background:white;margin:0 1.5rem;border-radius:4px;padding:2rem 1.5rem;transform:translateY(20px);opacity:0;transition:all 0.8s cubic-bezier(0.34,1.1,0.64,1);box-shadow:0 2px 12px rgba(200,100,140,0.1);min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem;}
.envelope.opened .letter-peek{transform:translateY(-30px);opacity:1;}
.letter-hb{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(1.6rem,5vw,2.5rem);color:#c05080;text-align:center;line-height:1.2;}
.letter-name{font-style:italic;color:#8a4060;font-size:1rem;letter-spacing:0.06em;}
.letter-from{font-style:italic;color:#b06080;font-size:0.88rem;margin-top:0.5rem;}

.env-hint{font-style:italic;color:rgba(80,20,40,0.45);font-size:0.82rem;margin-top:1.5rem;letter-spacing:0.08em;text-align:center;animation:hintPulse 2s ease-in-out infinite;}
@keyframes hintPulse{0%,100%{opacity:0.45;}50%{opacity:0.8;}}
.env-hint.hide{opacity:0;}

.world-btn{margin-top:1.2rem;background:rgba(255,255,255,0.6);backdrop-filter:blur(10px);border:1px solid rgba(255,180,200,0.7);color:#6a2040;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;padding:0.6rem 2rem;border-radius:20px;cursor:pointer;transition:all 0.3s;opacity:0;pointer-events:none;}
.world-btn.show{opacity:1;pointer-events:all;}
.world-btn:hover{background:rgba(255,255,255,0.85);transform:translateY(-2px);}

/* confetti */
.confetti-piece{position:fixed;pointer-events:none;animation:cfall linear forwards;z-index:999;}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- COUNTDOWN -->
<div id="countdown-wrap">
  <span class="cd-from">from avo · with love</span>
  <div class="cd-title">something is waiting for you,<br>girlie ♡</div>
  <div class="cd-units">
    <div class="cd-unit"><span class="cd-num" id="cd-d">00</span><span class="cd-lbl">days</span></div>
    <div class="cd-unit"><span class="cd-num" id="cd-h">00</span><span class="cd-lbl">hours</span></div>
    <div class="cd-unit"><span class="cd-num" id="cd-m">00</span><span class="cd-lbl">mins</span></div>
    <div class="cd-unit"><span class="cd-num" id="cd-s">00</span><span class="cd-lbl">secs</span></div>
  </div>
  <div class="cd-note">opens 14 may 2026 · midnight · malaysia time ✦</div>
</div>

<!-- ENVELOPE -->
<div id="envelope-wrap">
  <div class="envelope" id="envelope" onclick="openEnvelope()">
    <div class="envelope-body">
      <div class="flap">
        <div class="flap-triangle"></div>
        <div class="flap-seal">💌</div>
      </div>
      <div class="sides">
        <div class="side-left"></div>
        <div class="side-right"></div>
      </div>
      <div class="letter-peek">
        <div class="letter-hb">happy birthday,<br>girlie.</div>
        <div class="letter-name">zaii wong yue jia ✦</div>
        <div class="letter-from">— avo ♡</div>
      </div>
    </div>
  </div>
  <div class="env-hint" id="env-hint">tap the envelope ✦</div>
  <button class="world-btn" id="world-btn" onclick="window.location.href='index.html'">open your little world →</button>
</div>

<script>
// ── CANVAS: DREAMY SKY ──
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, t = 0;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const sparks = Array.from({length:90}, ()=>({
  x:Math.random(), y:Math.random(),
  r:0.5+Math.random()*2.5,
  ph:Math.random()*Math.PI*2,
  sp:0.4+Math.random()*1.8,
  type:Math.random()>0.5?'dot':'cross'
}));
const clouds = Array.from({length:7}, ()=>({
  x:Math.random(), y:0.05+Math.random()*0.5,
  w:0.15+Math.random()*0.22, h:0.06+Math.random()*0.1,
  sp:0.00008+Math.random()*0.00012,
  alpha:0.5+Math.random()*0.3, pink:Math.random()>0.5,
}));

function drawCloud(x,y,w,h,alpha,pink){
  ctx.save(); ctx.globalAlpha=alpha;
  const g=ctx.createRadialGradient(x,y,0,x,y,w);
  if(pink){g.addColorStop(0,'rgba(255,210,230,1)');g.addColorStop(0.5,'rgba(255,185,218,0.7)');g.addColorStop(1,'rgba(255,200,230,0)');}
  else{g.addColorStop(0,'rgba(230,240,255,1)');g.addColorStop(0.5,'rgba(210,228,255,0.7)');g.addColorStop(1,'rgba(220,235,255,0)');}
  ctx.fillStyle=g;
  [[0,0,0.5,0.5],[-.3,.1,.35,.4],[.3,.1,.35,.4],[.15,-.1,.3,.38],[-.15,-.05,.28,.35]].forEach(([dx,dy,rw,rh])=>{
    ctx.beginPath();ctx.ellipse(x+dx*w,y+dy*h,rw*w,rh*h,0,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
}
function drawSparkle(x,y,r,alpha,type){
  ctx.save(); ctx.globalAlpha=alpha;
  if(type==='cross'){
    ctx.strokeStyle='white';ctx.lineWidth=r*0.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x-r,y);ctx.lineTo(x+r,y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y-r);ctx.lineTo(x,y+r);ctx.stroke();
    ctx.lineWidth=r*0.25;
    ctx.beginPath();ctx.moveTo(x-r*.6,y-r*.6);ctx.lineTo(x+r*.6,y+r*.6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+r*.6,y-r*.6);ctx.lineTo(x-r*.6,y+r*.6);ctx.stroke();
  } else {
    const g=ctx.createRadialGradient(x,y,0,x,y,r*2);
    g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.3,'rgba(255,240,255,0.6)');g.addColorStop(1,'rgba(255,220,255,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r*2,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
function drawRainbow(){
  const cx=W*0.25,cy=H*0.9;
  const bands=[
    {r:Math.min(W,H)*0.85,c:'rgba(200,240,255,0.07)'},{r:Math.min(W,H)*0.78,c:'rgba(190,215,255,0.08)'},
    {r:Math.min(W,H)*0.71,c:'rgba(220,200,255,0.09)'},{r:Math.min(W,H)*0.64,c:'rgba(255,190,230,0.10)'},
    {r:Math.min(W,H)*0.57,c:'rgba(255,205,205,0.08)'},{r:Math.min(W,H)*0.50,c:'rgba(255,225,185,0.07)'},
  ];
  ctx.save();ctx.beginPath();ctx.rect(0,0,W,H*0.85);ctx.clip();
  bands.forEach(b=>{
    const g=ctx.createRadialGradient(cx,cy,b.r*0.88,cx,cy,b.r);
    g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(0.6,b.c);g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  });
  const sg=ctx.createLinearGradient(0,H*0.6,W,0);
  sg.addColorStop(0,'rgba(200,240,255,0)');sg.addColorStop(0.35,'rgba(220,200,255,0.10)');
  sg.addColorStop(0.5,'rgba(255,210,240,0.15)');sg.addColorStop(0.65,'rgba(200,240,255,0.08)');sg.addColorStop(1,'rgba(180,220,255,0)');
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);ctx.restore();
}
function drawFrame(){
  t+=0.006;
  const sh=Math.sin(t*0.12)*0.03;
  const gr=ctx.createLinearGradient(0,0,W*0.4,H);
  gr.addColorStop(0,`hsl(${208+sh*25},68%,${80+sh*4}%)`);
  gr.addColorStop(0.3,`hsl(${218+sh*18},60%,${83+sh*3}%)`);
  gr.addColorStop(0.6,`hsl(${295+sh*12},52%,${85+sh*3}%)`);
  gr.addColorStop(1,`hsl(${318+sh*8},58%,${87+sh*2}%)`);
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  drawRainbow();
  clouds.forEach(c=>{c.x+=c.sp;if(c.x>1.3)c.x=-0.3;drawCloud(c.x*W,c.y*H,c.w*W,c.h*H,c.alpha,c.pink);});
  sparks.forEach(s=>{const pulse=(Math.sin(t*s.sp+s.ph)+1)/2;const alpha=pulse*0.82;if(alpha>0.06)drawSparkle(s.x*W,s.y*H,s.r,alpha,s.type);});
  const glow=ctx.createRadialGradient(W*0.65,H*0.18,0,W*0.65,H*0.18,W*0.55);
  glow.addColorStop(0,'rgba(255,215,240,0.10)');glow.addColorStop(1,'rgba(255,215,240,0)');
  ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
  requestAnimationFrame(drawFrame);
}
drawFrame();

// ── COUNTDOWN ──
const unlockTime = new Date('2026-05-14T00:00:00+08:00');
function updateCD(){
  const diff = unlockTime - new Date();
  if(diff <= 0){ reveal(); return; }
  const d=Math.floor(diff/864e5),h=Math.floor(diff%864e5/36e5),m=Math.floor(diff%36e5/6e4),s=Math.floor(diff%6e4/1e3);
  document.getElementById('cd-d').textContent=String(d).padStart(2,'0');
  document.getElementById('cd-h').textContent=String(h).padStart(2,'0');
  document.getElementById('cd-m').textContent=String(m).padStart(2,'0');
  document.getElementById('cd-s').textContent=String(s).padStart(2,'0');
}
const cdInt = setInterval(updateCD, 1000);
updateCD();

function reveal(){
  clearInterval(cdInt);
  const cdWrap = document.getElementById('countdown-wrap');
  const envWrap = document.getElementById('envelope-wrap');
  cdWrap.style.transition='opacity 1s ease';
  cdWrap.style.opacity='0';
  setTimeout(()=>{
    cdWrap.style.display='none';
    envWrap.classList.add('show');
  }, 1100);
}

// ── ENVELOPE ──
let opened = false;
function openEnvelope(){
  if(opened) return;
  opened = true;
  document.getElementById('envelope').classList.add('opened');
  document.getElementById('env-hint').classList.add('hide');
  spawnConfetti();
  setTimeout(()=>document.getElementById('world-btn').classList.add('show'), 1200);
}

// ── CONFETTI ──
function spawnConfetti(){
  const items=['🌸','✨','⭐','🌙','💛','🌷','💫','🌟','🌺'];
  for(let i=0;i<35;i++)setTimeout(()=>{
    const c=document.createElement('div');c.className='confetti-piece';
    c.textContent=items[Math.floor(Math.random()*items.length)];
    c.style.cssText='left:'+Math.random()*100+'%;top:-20px;animation-duration:'+(2.5+Math.random()*3)+'s;font-size:'+(0.9+Math.random())+'rem;';
    document.body.appendChild(c);setTimeout(()=>c.remove(),6000);
  },i*60);
}
</script>
</body>
</html>
